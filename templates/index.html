<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Монополія — Лобі</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(180deg, #e8f4ea 0%, #f0f7f2 100%);
            margin: 0;
            min-height: 100vh;
            color: #1a1a1a;
        }
        .navbar {
            background: #fff;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(26, 95, 74, 0.08);
            border-bottom: 1px solid rgba(26, 95, 74, 0.1);
        }
        .navbar h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a5f4a;
            letter-spacing: -0.02em;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 24px;
        }
        .nav-links .user { color: #5a5a5a; font-size: 0.95rem; }
        .nav-links .user strong { color: #1a5f4a; }
        .nav-links a {
            text-decoration: none;
            color: #1a5f4a;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #c41e3a; }
        .container {
            max-width: 720px;
            margin: 40px auto;
            padding: 32px;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(26, 95, 74, 0.08), 0 0 0 1px rgba(26, 95, 74, 0.06);
        }
        .container h2 {
            margin: 0 0 24px 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .create-room-section {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 28px;
            border-bottom: 2px dashed #e5e7eb;
            align-items: center;
            flex-wrap: wrap;
        }
        .create-room-section input[type="text"] {
            flex: 1;
            min-width: 180px;
            padding: 14px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .create-room-section input:focus {
            outline: none;
            border-color: #1a5f4a;
        }
        .create-room-section select {
            padding: 14px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            background: #fff;
            cursor: pointer;
            color: #1a1a1a;
        }
        .create-room-section button {
            background: linear-gradient(180deg, #c41e3a 0%, #a01830 100%);
            color: #fff;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(196, 30, 58, 0.3);
        }
        .create-room-section button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(196, 30, 58, 0.35);
        }
        .container h3 {
            margin: 0 0 16px 0;
            font-size: 1.1rem;
            font-weight: 600;
            color: #5a5a5a;
        }
        #rooms-list { display: flex; flex-direction: column; gap: 12px; }
        .room-item {
            background: #f8faf9;
            padding: 20px 24px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #1a5f4a;
            transition: box-shadow 0.2s;
        }
        .room-item:hover { box-shadow: 0 4px 20px rgba(26, 95, 74, 0.1); }
        .room-item.full {
            border-left-color: #9ca3af;
            opacity: 0.85;
        }
        .room-info strong { font-size: 1.1rem; display: block; color: #1a1a1a; margin-bottom: 4px; }
        .room-info span { font-size: 0.9rem; color: #6b7b6e; }
        .join-btn {
            background: linear-gradient(180deg, #1a5f4a 0%, #0f3d32 100%) !important;
            color: #fff !important;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .join-btn:hover:not(:disabled) { transform: translateY(-2px); }
        .join-btn:disabled {
            background: #d1d5db !important;
            cursor: not-allowed;
            transform: none;
        }
        .empty-msg { color: #9ca3af; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Монополія</h1>
        <div class="nav-links">
            <span class="user">Вітаємо, <strong>{{ username }}</strong>!</span>
            <a href="/profile">Мій профіль</a>
            <a href="/logout">Вийти</a>
        </div>
    </div>

    <div class="container">
        <h2>Ігрове лобі</h2>
        <div class="create-room-section">
            <input type="text" id="new-room-name" placeholder="Назва кімнати...">
            <select id="max-players">
                <option value="3">3 гравці</option>
                <option value="4" selected>4 гравці</option>
                <option value="5">5 гравців</option>
                <option value="6">6 гравців</option>
            </select>
            <button onclick="createRoom()">Створити гру</button>
        </div>
        <h3>Доступні ігри</h3>
        <div id="rooms-list">
            <p class="empty-msg">Поки немає активних кімнат. Створіть першу!</p>
        </div>
    </div>

    <script>
        const socket = io();
        const myUsername = "{{ username }}";

        socket.on('connect', function() { socket.emit('request_rooms'); });

        function createRoom() {
            const roomName = document.getElementById('new-room-name').value;
            const maxPlayers = document.getElementById('max-players').value;
            if (roomName.trim() !== "") {
                socket.emit('create_room', { room_name: roomName, max_players: maxPlayers });
                document.getElementById('new-room-name').value = '';
            }
        }

        function joinRoom(roomName) { socket.emit('join_game_room', { room_name: roomName }); }

        socket.on('update_rooms', function(data) {
            const roomsContainer = document.getElementById('rooms-list');
            roomsContainer.innerHTML = "";
            const rooms = data.rooms;
            const roomNames = Object.keys(rooms);

            if (roomNames.length === 0) {
                roomsContainer.innerHTML = '<p class="empty-msg">Поки немає активних кімнат. Створіть першу!</p>';
                return;
            }

            roomNames.forEach(function(roomName) {
                const roomData = rooms[roomName];
                const playersInRoom = roomData.players;
                const maxPlayers = roomData.max_players;
                const isFull = playersInRoom.length >= maxPlayers;
                const amIInRoom = playersInRoom.includes(myUsername);

                const roomDiv = document.createElement('div');
                roomDiv.className = 'room-item';
                if (isFull) roomDiv.classList.add('full');

                let playersText = playersInRoom.length > 0 ? playersInRoom.join(', ') : 'Порожньо';
                let buttonHtml = '';
                if (amIInRoom) {
                    buttonHtml = `<button class="join-btn" disabled style="background: linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%) !important;">Очікування гравців...</button>`;
                } else if (isFull) {
                    buttonHtml = `<button class="join-btn" disabled>Місць немає</button>`;
                } else {
                    buttonHtml = `<button class="join-btn" onclick="joinRoom('${roomName}')">Приєднатися</button>`;
                }

                roomDiv.innerHTML = `
                    <div class="room-info">
                        <strong>${roomName}</strong>
                        <span>Гравці: ${playersInRoom.length}/${maxPlayers} (${playersText})</span>
                    </div>
                    ${buttonHtml}
                `;
                roomsContainer.appendChild(roomDiv);
            });
        });

        socket.on('start_game', function(data) {
            window.location.href = "/game/" + data.room_name;
        });
    </script>
</body>
</html>
