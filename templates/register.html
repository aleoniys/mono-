<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація - Монополія</title>
    <style>
        /* Ті самі стилі для всієї сторінки, що і на сторінці входу */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #D4E7D0; /* Світло-зелений фон */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Стилі для білої картки */
        .login-card {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            width: 300px;
            text-align: center;
            border: 2px solid #333;
        }

        h2 {
            margin-top: 0;
            color: #333;
            font-size: 28px;
            margin-bottom: 20px;
        }

        /* Повідомлення про помилки (наприклад, якщо ім'я зайняте) */
        .error-message {
            color: #E3000F;
            background-color: #ffe6e6;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        /* Поля для вводу */
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #4CAF50;
            outline: none;
        }

        /* Кнопка */
        button {
            width: 100%;
            background-color: #E3000F;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #C2000D;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Посилання для повернення на сторінку входу */
        .login-link {
            display: block;
            margin-top: 20px;
            color: #555;
            text-decoration: none;
            font-size: 14px;
        }

        .login-link:hover {
            color: #E3000F;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Реєстрація</h2>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="error-message">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="/register">
            <input type="text" name="username" placeholder="Придумайте ім'я" required>
            <input type="password" name="password" placeholder="Придумайте пароль" required>
            <button type="submit">ЗАРЕЄСТРУВАТИСЯ</button>
        </form>
        
        <a href="/login" class="login-link">Вже маєте акаунт? Увійти</a>
    </div>

</body>
</html>
