<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Профіль — Монополія</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(145deg, #e8f4ea 0%, #d4e7d0 50%, #c5dfc0 100%);
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .profile-card {
            background: #fff;
            padding: 48px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(26, 95, 74, 0.12), 0 0 0 1px rgba(26, 95, 74, 0.06);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .avatar {
            width: 88px;
            height: 88px;
            background: linear-gradient(145deg, #1a5f4a 0%, #0f3d32 100%);
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.25rem;
            color: #fff;
            font-weight: 700;
            box-shadow: 0 8px 24px rgba(26, 95, 74, 0.3);
        }
        .profile-card h2 {
            margin: 0 0 6px 0;
            font-size: 1.75rem;
            font-weight: 700;
            color: #1a1a1a;
        }
        .profile-card .tagline {
            color: #6b7b6e;
            font-size: 0.95rem;
            margin-bottom: 28px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 28px;
        }
        .stat-box {
            background: #f8faf9;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e5e7eb;
        }
        .stat-box.bonus {
            grid-column: span 2;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border-color: #f59e0b;
        }
        .stat-number { font-size: 1.75rem; font-weight: 700; color: #1a5f4a; margin-bottom: 4px; }
        .stat-box.bonus .stat-number { color: #b45309; }
        .stat-label { font-size: 0.75rem; color: #6b7b6e; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
        .stat-box.bonus .stat-label { color: #92400e; }
        .back-btn {
            display: inline-block;
            width: 100%;
            background: linear-gradient(180deg, #1a5f4a 0%, #0f3d32 100%);
            color: #fff;
            padding: 14px 24px;
            text-decoration: none;
            border-radius: 12px;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            text-align: center;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(26, 95, 74, 0.3);
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 95, 74, 0.35);
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="avatar">{{ username[0]|upper }}</div>
        <h2>{{ username }}</h2>
        <p class="tagline">Досвідчений гравець</p>
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-number">{{ games }}</div>
                <div class="stat-label">Зіграно ігор</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">{{ wins }}</div>
                <div class="stat-label">Перемог</div>
            </div>
            <div class="stat-box bonus">
                <div class="stat-number">🪙 {{ bonus }}</div>
                <div class="stat-label">Бонусні бали</div>
            </div>
        </div>
        <a href="/" class="back-btn">Повернутися в лобі</a>
    </div>
</body>
</html>
