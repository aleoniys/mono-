<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Профіль - Монополія</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .profile-card {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
            border-top: 6px solid #2980b9;
        }

        .avatar {
            width: 80px;
            height: 80px;
            background-color: #D4E7D0;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            color: #2c3e50;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        h2 { margin: 0 0 5px 0; color: #333; font-size: 28px;}
        p { color: #777; margin-bottom: 25px; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #eee;
        }

        .stat-box.bonus {
            grid-column: span 2;
            background: #fff9c4;
            border-color: #f1c40f;
            color: #d35400;
        }

        .stat-number { font-size: 24px; font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        .stat-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px;}

        .back-btn {
            display: inline-block;
            background-color: #34495e;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        
        .back-btn:hover { background-color: #2c3e50; transform: translateY(-2px);}
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar">{{ username[0]|upper }}</div>
        <h2>{{ username }}</h2>
        <p>Досвідчений гравець</p>
        
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-number">{{ games }}</div>
                <div class="stat-label">Зіграно ігор</div>
            </div>
            <div class="stat-box">
                <div class="stat-number">{{ wins }}</div>
                <div class="stat-label">Перемог</div>
            </div>
            <div class="stat-box bonus">
                <div class="stat-number" style="color: #d35400;">🪙 {{ bonus }}</div>
                <div class="stat-label" style="color: #e67e22;">Бонусні бали</div>
            </div>
        </div>

        <a href="/" class="back-btn">Повернутися в лоббі</a>
    </div>

</body>
</html>
