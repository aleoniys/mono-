<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Гра: {{ room_name }} — Монополія</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(180deg, #1a3d32 0%, #0f2820 100%); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 12px; overflow: hidden; }

        .top-panel { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-bottom: 12px; width: 100%; max-width: 920px; }
        .player-badge { background: #fff; color: #1a1a1a; padding: 12px 18px; border-radius: 14px; font-weight: 600; border-left: 5px solid #9ca3af; box-shadow: 0 4px 16px rgba(0,0,0,0.15); text-align: center; font-size: clamp(12px, 1.5vw, 15px); flex: 1; min-width: 130px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .player-badge:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
        .player-badge.bankrupt { opacity: 0.5; filter: grayscale(100%); text-decoration: line-through; cursor: not-allowed; }
        .player-badge span { display: block; font-size: 0.85em; color: #6b7b6e; margin-top: 4px; font-weight: 500; }
        .jail-icon { color: #c41e3a; font-size: 1.1em; margin-left: 4px; }

        .board { display: grid; grid-template-columns: repeat(11, 1fr); grid-template-rows: repeat(11, 1fr); gap: 2px; background: #1a1a1a; border: 4px solid #2d2d2d; padding: 3px; border-radius: 12px; box-shadow: 0 16px 48px rgba(0,0,0,0.4); width: 100%; max-width: 82vh; aspect-ratio: 1 / 1; }

        .cell { background: #d4e7d0; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; overflow: hidden; cursor: pointer; transition: filter 0.2s; }
        .cell:hover { filter: brightness(0.92); }
        .mortgaged { filter: grayscale(100%) opacity(0.75); }
        .corner { background: linear-gradient(145deg, #f59e0b 0%, #d97706 100%); justify-content: center; cursor: default; }
        .corner:hover { filter: none; }
        .chance-cell { background: linear-gradient(145deg, #fef3c7 0%, #fde68a 100%); color: #92400e; justify-content: center; cursor: default; }
        .chance-cell:hover { filter: none; }
        .color-bar { width: 100%; height: 20%; border-bottom: 1px solid rgba(0,0,0,0.15); flex-shrink: 0; display: flex; justify-content: center; align-items: center; font-size: clamp(6px, 1vmin, 11px); color: #fff; text-shadow: 0 0 2px #000; font-weight: 600; }
        .cell-content { padding: 3px; word-wrap: break-word; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; align-items: center; width: 100%; font-size: clamp(5px, 1.1vmin, 10px); }
        .tokens-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; padding-bottom: 2px; width: 100%; }
        .token { width: clamp(6px, 1.5vmin, 16px); height: clamp(6px, 1.5vmin, 16px); border-radius: 50%; border: 1px solid #fff; box-shadow: 0 0 3px #000; z-index: 10; }
        @keyframes hop { 0% { transform: translateY(0); } 50% { transform: translateY(-50%) scale(1.1); } 100% { transform: translateY(0); } }
        .hopping { animation: hop 0.25s linear; }

        .center-panel { grid-column: 2 / 11; grid-row: 2 / 11; background: linear-gradient(180deg, #f8faf9 0%, #f0f7f2 100%); display: flex; flex-direction: column; overflow: hidden; position: relative; border-radius: 4px; }
        .turn-indicator { background: linear-gradient(180deg, #1a5f4a 0%, #0f3d32 100%); color: #fff; text-align: center; padding: clamp(8px, 1.2vw, 12px); font-size: clamp(14px, 2vmin, 18px); font-weight: 700; flex-shrink: 0; transition: background 0.3s; }
        .timer-bar-container { width: 100%; height: 6px; background: #e5e7eb; }
        .timer-bar { height: 100%; background: linear-gradient(90deg, #1a5f4a, #22c55e); width: 100%; transition: width 1s linear, background 0.5s; border-radius: 0 2px 2px 0; }

        .dice-area { background: #fff; padding: clamp(10px, 1.5vw, 18px); text-align: center; border-bottom: 2px solid #e5e7eb; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .dice-faces { font-size: clamp(28px, 5vmin, 48px); line-height: 1; color: #c41e3a; display: flex; gap: 12px; justify-content: center; margin: 6px 0; }
        .jail-warning { font-size: clamp(10px, 1.5vmin, 13px); color: #b91c1c; font-weight: 600; margin-top: 6px; }

        .chat-container { display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
        .chat-messages { flex-grow: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fff; }
        .chat-message { background: #f8faf9; border: 1px solid #e5e7eb; padding: clamp(6px, 1vw, 10px); border-radius: 12px; align-self: flex-start; max-width: 95%; }
        .message-sender { font-size: clamp(9px, 1.2vmin, 11px); font-weight: 700; color: #1a5f4a; border-bottom: 1px dashed #e5e7eb; padding-bottom: 4px; margin-bottom: 4px; }
        .message-text { font-size: clamp(10px, 1.5vmin, 13px); color: #1a1a1a; }
        .chat-input-area { display: flex; padding: clamp(8px, 1vw, 12px); background: #f0f7f2; border-top: 1px solid #e5e7eb; flex-shrink: 0; gap: 8px; }
        .chat-input-area input { flex-grow: 1; padding: 10px 14px; border: 2px solid #e5e7eb; border-radius: 10px; font-family: inherit; font-size: clamp(11px, 1.5vmin, 14px); }
        .chat-input-area input:focus { outline: none; border-color: #1a5f4a; }
        .chat-input-area button { background: linear-gradient(180deg, #1a5f4a 0%, #0f3d32 100%); color: #fff; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 0.9rem; }

        .action-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
        .btn { padding: clamp(8px, 1vw, 12px) clamp(14px, 2vw, 24px); border-radius: 10px; font-size: clamp(11px, 1.5vmin, 14px); font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: transform 0.15s, box-shadow 0.2s; }
        .btn:active { transform: scale(0.97); }
        .btn-roll { background: linear-gradient(180deg, #c41e3a 0%, #a01830 100%); color: #fff; box-shadow: 0 4px 12px rgba(196, 30, 58, 0.35); }
        .btn-roll:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(196, 30, 58, 0.4); }
        .btn-buy { background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%); color: #fff; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); }
        .btn-skip { background: linear-gradient(180deg, #94a3b8 0%, #64748b 100%); color: #fff; }
        .btn-upgrade { background: linear-gradient(180deg, #f59e0b 0%, #d97706 100%); color: #fff; box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3); }
        .btn-pay-debt { background: linear-gradient(180deg, #dc2626 0%, #b91c1c 100%); color: #fff; }
        .btn-exit { background: linear-gradient(180deg, #7c3aed 0%, #5b21b6 100%); color: #fff; }
        .btn:disabled { background: #d1d5db !important; cursor: not-allowed; box-shadow: none; color: #6b7280; transform: none; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal { background: #fff; padding: 28px; border-radius: 20px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; color: #1a1a1a; font-size: 14px; font-family: 'Outfit', sans-serif; box-shadow: 0 24px 60px rgba(0,0,0,0.25); border: 1px solid #e5e7eb; }
        .modal h2 { margin: 0 0 16px 0; text-align: center; color: #1a5f4a; font-size: 1.35rem; border-bottom: 2px solid #e5e7eb; padding-bottom: 12px; }
        .modal-buttons { display: flex; justify-content: center; gap: 16px; margin-top: 20px; flex-wrap: wrap; }
        .trade-section { display: flex; gap: 24px; margin-bottom: 20px; flex-wrap: wrap; }
        .trade-half { flex: 1; background: #f8faf9; padding: 20px; border-radius: 14px; border: 2px solid #e5e7eb; min-width: 200px; }
        .trade-half h3 { margin: 0 0 12px 0; font-size: 0.9rem; color: #6b7b6e; font-weight: 600; }
        .prop-list { margin-top: 12px; max-height: 160px; overflow-y: auto; background: #fff; border: 2px solid #e5e7eb; padding: 10px; border-radius: 10px; }
        .money-input { width: 100%; padding: 10px 14px; margin-top: 8px; border: 2px solid #e5e7eb; border-radius: 10px; font-family: inherit; font-size: 1rem; }
        .money-input:focus { outline: none; border-color: #1a5f4a; }
        .manage-prop-btn { width: 100%; padding: 12px; margin: 6px 0; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: transform 0.1s; }
        .btn-sell-up { background: linear-gradient(180deg, #f59e0b 0%, #d97706 100%); color: #fff; }
        .btn-mortgage { background: linear-gradient(180deg, #64748b 0%, #475569 100%); color: #fff; }
        .btn-unmortgage { background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%); color: #fff; }
    </style>
</head>
<body>

    <div class="top-panel" id="top-panel"></div>

    <div class="board" id="board">
        <div class="center-panel">
            <div class="turn-indicator" id="turn-indicator">Завантаження гри...</div>
            <div class="timer-bar-container"><div class="timer-bar" id="timer-bar"></div></div>
            
            <div class="dice-area">
                <div id="dice-result">Гра готова до початку!</div>
                <div class="action-buttons" id="action-buttons">
                    <button id="btn-roll" class="btn btn-roll" onclick="rollDice()" disabled>🎲 Кинути</button>
                    <button id="btn-buy" class="btn btn-buy" style="display:none;" onclick="buyProperty()">Купити (1000)</button>
                    <button id="btn-upgrade" class="btn btn-upgrade" style="display:none;" onclick="upgradeProperty()">⭐ Покращити (500)</button>
                    <button id="btn-skip" class="btn btn-skip" style="display:none;" onclick="skipBuy()">Пропустити</button>
                    <button id="btn-pay-debt" class="btn btn-pay-debt" style="display:none;" onclick="payDebt()">Сплатити борг</button>
                    
                    <button id="btn-exit" class="btn btn-exit" style="display:none;" onclick="window.location.href='/'">🔙 Повернутися в лоббі</button>
                </div>
            </div>

            <div class="chat-container">
                <div class="chat-messages" id="chat-messages"></div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Повідомлення..." onkeypress="handleKeyPress(event)">
                    <button onclick="sendMessage()">Надіслати</button>
                </div>
            </div>
        </div>
    </div>

    <div id="manage-modal" class="modal-overlay">
        <div class="modal" style="max-width: 300px; text-align: center;">
            <h2 id="manage-title">Назва компанії</h2>
            <p id="manage-info">Статус...</p>
            <div id="manage-buttons"></div>
            <button class="manage-prop-btn" style="background: #ccc;" onclick="closeManageModal()">Закрити</button>
        </div>
    </div>

    <div id="trade-modal" class="modal-overlay">
        <div class="modal">
            <h2 id="trade-modal-title">Торгівля</h2>
            <div class="trade-section">
                <div class="trade-half">
                    <h3>Я ВІДДАЮ</h3>
                    <label>Бали (Макс <span id="my-max-money">0</span>):</label>
                    <input type="number" id="trade-offer-money" class="money-input" value="0" min="0">
                    <div class="prop-list" id="my-props-list"></div>
                </div>
                <div class="trade-half">
                    <h3>Я ХОЧУ ОТРИМАТИ</h3>
                    <label>Бали (Макс <span id="target-max-money">0</span>):</label>
                    <input type="number" id="trade-request-money" class="money-input" value="0" min="0">
                    <div class="prop-list" id="target-props-list"></div>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-buy" onclick="sendTradeOffer()">Запропонувати</button>
                <button class="btn btn-skip" onclick="closeTradeModal()">Скасувати</button>
            </div>
        </div>
    </div>

    <div id="incoming-trade-modal" class="modal-overlay">
        <div class="modal">
            <h2 id="incoming-trade-title">Пропозиція обміну!</h2>
            <div class="trade-section">
                <div class="trade-half"><h3>ГРАВЕЦЬ ВІДДАЄ:</h3><p id="incoming-offer-text"></p></div>
                <div class="trade-half"><h3>ГРАВЕЦЬ ХОЧЕ:</h3><p id="incoming-request-text"></p></div>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-buy" onclick="respondToTrade(true)">Прийняти</button>
                <button class="btn btn-roll" onclick="respondToTrade(false)">Відхилити</button>
            </div>
        </div>
    </div>

    <div id="game-over-modal" class="modal-overlay" style="z-index: 2000;">
        <div class="modal" style="text-align: center; border: 4px solid #1a5f4a;">
            <h1 id="game-over-title" style="font-size: 2rem; margin-bottom: 16px; color: #1a5f4a;">🏆 ВИ ПЕРЕМОГЛИ! 🏆</h1>
            <p style="font-size: 1.1rem; color: #5a5a5a;">Гру завершено. Повернення в лоббі через <strong id="redirect-timer">5</strong> сек...</p>
        </div>
    </div>

    <script>
        const socket = io();
        const currentRoom = "{{ room_name }}"; 
        const myUsername = "{{ username }}";

        const groupColors = {
            1:'#8e44ad', 2:'#8e44ad', 3:'#8e44ad', 6:'#3498db', 7:'#3498db', 8:'#3498db', 
            11:'#e84393', 12:'#e84393', 13:'#e84393', 16:'#e67e22', 17:'#e67e22', 18:'#e67e22', 
            21:'#c0392b', 22:'#c0392b', 23:'#c0392b', 26:'#f1c40f', 27:'#f1c40f', 28:'#f1c40f', 
            31:'#27ae60', 32:'#27ae60', 33:'#27ae60', 36:'#2980b9', 37:'#2980b9', 38:'#2980b9'  
        };
        const colorGroupsList = [
            [1,2,3], [6,7,8], [11,12,13], [16,17,18],
            [21,22,23], [26,27,28], [31,32,33], [36,37,38]
        ];
        const rentPrices = {
            1: 50, 2: 50, 3: 50, 6: 100, 7: 100, 8: 100, 11: 150, 12: 150, 13: 150,
            16: 200, 17: 200, 18: 200, 21: 250, 22: 250, 23: 250, 26: 300, 27: 300, 28: 300,
            31: 400, 32: 400, 33: 400, 36: 500, 37: 500, 38: 500
        };
        const companyNames = {
            1: "Кіоск", 2: "Кав'ярня", 3: "Пекарня", 6: "Автомийка", 7: "Шиномонтаж", 8: "СТО",
            11: "Перукарня", 12: "Салон краси", 13: "Барбершоп", 16: "Піцерія", 17: "Суші-бар", 18: "Ресторан",
            21: "Кінотеатр", 22: "Боулінг", 23: "Аквапарк", 26: "Аптека", 27: "Приватна клініка", 28: "Стоматологія",
            31: "Провайдер", 32: "IT", 33: "ШІ-Стартап", 36: "ТЦ", 37: "Готель", 38: "Банк"
        };

        const board = document.getElementById('board');
        const cellsMap = {}; 
        let tokensMap = {};
        let visualPositions = {};
        let globalGameState = null;
        let turnTimer;
        let timeLeft = 60;
        let currentTradeTarget = null;
        let currentTradeSender = null;

        function drawBoard() {
            for (let i = 0; i < 40; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => onCellClick(i);

                if (groupColors[i]) {
                    cell.innerHTML = `
                        <div class="color-bar" id="colorbar-${i}" style="background-color: ${groupColors[i]}"></div>
                        <div class="cell-content">
                            <div>${companyNames[i]}</div>
                            <div style="font-size: 0.8em; color: #555;" id="rent-info-${i}">Оренда: <span id="rent-${i}">${rentPrices[i]}</span></div>
                            <div style="font-size: 0.8em; color: #c0392b; font-weight: bold; display:none;" id="mortgage-info-${i}">🔒 ЗАКЛАДЕНО</div>
                            <div class="tokens-container" id="tokens-${i}"></div>
                        </div>
                    `;
                } else if (i === 0 || i === 10 || i === 20 || i === 30) {
                    cell.classList.add('corner');
                    let cornerText = i===0 ? "СТАРТ" : (i===10 ? "ТЮРМА" : (i===20 ? "ПАРКОВКА" : "ПОЛІЦІЯ"));
                    cell.innerHTML = `<div class="cell-content" style="justify-content: center;"><div>${cornerText}</div><div class="tokens-container" id="tokens-${i}"></div></div>`;
                } else {
                    cell.classList.add('chance-cell');
                    cell.innerHTML = `<div class="cell-content" style="justify-content: center;"><div>❓ ШАНС</div><div class="tokens-container" id="tokens-${i}"></div></div>`;
                }

                if (i < 11) { cell.style.gridRow = '11'; cell.style.gridColumn = (11 - i).toString(); }
                else if (i < 20) { cell.style.gridColumn = '1'; cell.style.gridRow = (11 - (i - 10)).toString(); }
                else if (i < 31) { cell.style.gridRow = '1'; cell.style.gridColumn = (i - 20 + 1).toString(); }
                else { cell.style.gridColumn = '11'; cell.style.gridRow = (i - 30 + 1).toString(); }
                
                board.appendChild(cell);
                cellsMap[i] = cell; 
            }
        }
        drawBoard();

        socket.on('connect', function() {
            socket.emit('join_game_room', { room_name: currentRoom });
            socket.emit('request_game_state', { room_name: currentRoom });
        });

        function startTimer(isMyTurn, targetTurnPlayer) {
            clearInterval(turnTimer);
            timeLeft = 60;
            const bar = document.getElementById('timer-bar');
            bar.style.width = '100%';
            bar.style.backgroundColor = '#2ecc71';

            turnTimer = setInterval(() => {
                timeLeft--;
                bar.style.width = ((timeLeft / 60) * 100) + '%';
                if (timeLeft < 15) bar.style.backgroundColor = '#e74c3c';
                else if (timeLeft < 30) bar.style.backgroundColor = '#f1c40f';

                if (timeLeft <= 0) {
                    clearInterval(turnTimer);
                    // Тепер БУДЬ-ЯКИЙ клієнт може повідомити сервер про закінчення часу поточного гравця
                    socket.emit('turn_timeout', { room_name: currentRoom, target_player: targetTurnPlayer });
                }
            }, 1000);
        }

        socket.on('update_state', async function(state) {
            globalGameState = state; 
            const currentTurnPlayer = state.players_order[state.turn_index];
            const isMyTurn = (myUsername === currentTurnPlayer);
            const amIBankrupt = state.players_data[myUsername].bankrupt;

            // Якщо я живий - працює мій таймер
            if (!amIBankrupt) {
                startTimer(isMyTurn, currentTurnPlayer);
            } else {
                clearInterval(turnTimer);
                document.getElementById('timer-bar').style.width = '0%';
            }

            const topPanel = document.getElementById('top-panel');
            topPanel.innerHTML = '';
            state.players_order.forEach(name => {
                const pData = state.players_data[name];
                const badge = document.createElement('div');
                badge.className = 'player-badge';
                if (pData.bankrupt) badge.classList.add('bankrupt');
                badge.style.borderLeftColor = pData.color;
                
                badge.onclick = function() { 
                    if (!pData.bankrupt && name !== myUsername && !amIBankrupt) openTradeModal(name); 
                };
                
                let jailIcon = pData.jail_turns > 0 ? `<span class="jail-icon">⛓️ (${pData.jail_turns})</span>` : "";
                badge.innerHTML = `${name} ${jailIcon} <span>Баланс: ${pData.balance}</span>`;
                if (name === currentTurnPlayer && !pData.bankrupt) badge.style.boxShadow = `0 0 15px ${pData.color}`;
                topPanel.appendChild(badge);
            });

            for (let i = 0; i < 40; i++) {
                cellsMap[i].style.border = '';
                cellsMap[i].classList.remove('mortgaged');
                if(groupColors[i]) {
                    document.getElementById(`colorbar-${i}`).innerHTML = '';
                    document.getElementById(`rent-${i}`).innerText = rentPrices[i];
                    document.getElementById(`rent-info-${i}`).style.display = 'block';
                    document.getElementById(`mortgage-info-${i}`).style.display = 'none';
                }
            }
            
            for (const [cellStr, ownerName] of Object.entries(state.properties)) {
                const cellIndex = parseInt(cellStr);
                const ownerColor = state.players_data[ownerName].color;
                cellsMap[cellIndex].style.border = `3px solid ${ownerColor}`;
                
                if (state.mortgages && state.mortgages[cellStr]) {
                    cellsMap[cellIndex].classList.add('mortgaged');
                    document.getElementById(`rent-info-${cellIndex}`).style.display = 'none';
                    const mInfo = document.getElementById(`mortgage-info-${cellIndex}`);
                    mInfo.style.display = 'block';
                    mInfo.innerText = `🔒 ЗАКЛАДЕНО (${state.mortgages[cellStr]} хід.)`;
                } else {
                    const upgrades = state.upgrades[cellStr] || 0;
                    if (upgrades > 0) {
                        document.getElementById(`colorbar-${cellIndex}`).innerHTML = '⭐'.repeat(upgrades);
                        document.getElementById(`rent-${cellIndex}`).innerText = rentPrices[cellIndex] * (1 + upgrades * 2);
                    }
                }
            }

            const btnRoll = document.getElementById('btn-roll');
            const btnBuy = document.getElementById('btn-buy');
            const btnSkip = document.getElementById('btn-skip');
            const btnUpgrade = document.getElementById('btn-upgrade');
            const btnPayDebt = document.getElementById('btn-pay-debt');
            const btnExit = document.getElementById('btn-exit');
            
            btnRoll.style.display = 'none'; btnBuy.style.display = 'none'; btnSkip.style.display = 'none'; 
            btnUpgrade.style.display = 'none'; btnPayDebt.style.display = 'none'; btnExit.style.display = 'none';

            let animations = [];
            state.players_order.forEach(name => {
                const pData = state.players_data[name];
                if (pData.bankrupt) {
                    if (tokensMap[name]) { tokensMap[name].remove(); delete tokensMap[name]; }
                    return;
                }
                const targetPos = pData.pos;
                if (!tokensMap[name]) {
                    const token = document.createElement('div');
                    token.className = 'token';
                    token.style.backgroundColor = pData.color;
                    tokensMap[name] = token;
                    visualPositions[name] = targetPos;
                    document.getElementById(`tokens-${targetPos}`).appendChild(token);
                }
                const startPos = visualPositions[name];
                if (startPos !== targetPos) {
                    let dist = (targetPos - startPos + 40) % 40; 
                    if (dist > 12) {
                        document.getElementById(`tokens-${targetPos}`).appendChild(tokensMap[name]);
                        visualPositions[name] = targetPos;
                    } else {
                        animations.push(new Promise(async (resolve) => {
                            let current = startPos;
                            for (let i = 0; i < dist; i++) {
                                current = (current + 1) % 40; 
                                const tkn = tokensMap[name];
                                document.getElementById(`tokens-${current}`).appendChild(tkn);
                                tkn.classList.remove('hopping'); void tkn.offsetWidth; tkn.classList.add('hopping');
                                await new Promise(r => setTimeout(r, 200));
                            }
                            visualPositions[name] = targetPos; 
                            resolve(); 
                        }));
                    }
                }
            });
            if (animations.length > 0) await Promise.all(animations);

            // --- ЛОГІКА КНОПОК ДЛЯ БАНКРУТА ---
            if (amIBankrupt) {
                document.getElementById('turn-indicator').innerText = `💀 Ви збанкрутували!`;
                document.getElementById('turn-indicator').style.backgroundColor = `#e74c3c`;
                document.getElementById('dice-result').innerText = `Ви можете спостерігати за грою або вийти в лоббі.`;
                btnExit.style.display = 'block';
                return; // Блокуємо всі інші ігрові кнопки
            } else {
                document.getElementById('turn-indicator').style.backgroundColor = `#34495e`;
                document.getElementById('turn-indicator').innerText = `Хід гравця: ${currentTurnPlayer}`;
            }

            if (state.debt && state.debt.player === myUsername) {
                btnPayDebt.style.display = 'block';
                btnPayDebt.innerText = `Сплатити борг (${state.debt.amount})`;
                if (state.players_data[myUsername].balance < state.debt.amount) {
                    btnPayDebt.disabled = true;
                    document.getElementById('dice-result').innerHTML = `<span style="color:#e74c3c; font-weight:bold;">Продайте покращення або закладіть майно!</span>`;
                } else {
                    btnPayDebt.disabled = false;
                    document.getElementById('dice-result').innerHTML = `У вас є гроші, сплатіть борг.`;
                }
                return; 
            }

            if (state.waiting_for_buy) {
                if (isMyTurn) { btnBuy.style.display = 'block'; btnSkip.style.display = 'block'; } 
                else { btnRoll.style.display = 'block'; btnRoll.disabled = true; btnRoll.innerText = 'Очікування рішення...'; }
            } else {
                btnRoll.style.display = 'block';
                if (isMyTurn && !state.debt) {
                    btnRoll.disabled = false;
                    btnRoll.innerText = state.players_data[myUsername].jail_turns > 0 ? '🎲 Кинути (Спроба дубля)' : '🎲 Кинути кубики';
                    
                    const myPos = state.players_data[myUsername].pos;
                    if (state.properties[myPos] === myUsername && !state.has_upgraded_this_turn) {
                        const myGroup = colorGroupsList.find(g => g.includes(myPos));
                        if (myGroup) {
                            const ownsAll = myGroup.every(p => state.properties[p] === myUsername);
                            const currentLevel = state.upgrades[myPos] || 0;
                            if (ownsAll && currentLevel < 3 && state.players_data[myUsername].balance >= 500) {
                                btnUpgrade.style.display = 'block';
                            }
                        }
                    }
                } else {
                    btnRoll.disabled = true;
                    btnRoll.innerText = 'Очікування ходу...';
                }
            }
        });

        // ІГРОВІ ДІЇ
        function rollDice() { socket.emit('roll_dice', { room_name: currentRoom }); document.getElementById('btn-roll').disabled = true; }
        function buyProperty() { socket.emit('buy_property', { room_name: currentRoom }); }
        function skipBuy() { socket.emit('skip_buy', { room_name: currentRoom }); }
        function payDebt() { socket.emit('pay_debt', { room_name: currentRoom }); }
        function upgradeProperty() { socket.emit('upgrade_property', { room_name: currentRoom }); document.getElementById('btn-upgrade').style.display = 'none'; }

        socket.on('dice_rolled', function(data) {
            const diceResultDiv = document.getElementById('dice-result');
            const diceFacesArr = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            let ticks = 0;
            let spinInterval = setInterval(() => {
                ticks++;
                diceResultDiv.innerHTML = `
                    <div style="font-size: clamp(10px, 1.2vw, 14px); color: #777;">Крутимо кубики...</div>
                    <div class="dice-faces"><span>${diceFacesArr[Math.floor(Math.random()*6)]}</span><span>${diceFacesArr[Math.floor(Math.random()*6)]}</span></div>
                `;
                if (ticks > 10) {
                    clearInterval(spinInterval);
                    let doubleMsg = (data.is_double && !data.jail_msg) ? `<div style="color: #27ae60; font-weight: bold; margin-top: 5px; font-size: 14px;">🎲 ДУБЛЬ! Додатковий хід!</div>` : "";
                    diceResultDiv.innerHTML = `
                        <div style="font-size: clamp(10px, 1.2vw, 14px); color: #777;">${data.player} кинув:</div>
                        <div class="dice-faces"><span>${diceFacesArr[data.dice1 - 1]}</span><span>${diceFacesArr[data.dice2 - 1]}</span></div>
                        <div style="font-size: clamp(12px, 1.5vw, 16px); color: #333;">Разом: <strong>${data.total}</strong></div>
                        ${doubleMsg}
                        ${data.jail_msg ? `<div class="jail-warning">${data.jail_msg}</div>` : ""}
                    `;
                }
            }, 100);
        });

        // УПРАВЛІННЯ ВЛАСНІСТЮ
        function onCellClick(pos) {
            if (!globalGameState) return;
            const currentTurnPlayer = globalGameState.players_order[globalGameState.turn_index];
            if (myUsername !== currentTurnPlayer || globalGameState.players_data[myUsername].bankrupt) return;
            if (globalGameState.properties[pos] !== myUsername) return;

            const upgrades = globalGameState.upgrades[pos] || 0;
            const isMortgaged = globalGameState.mortgages && globalGameState.mortgages[pos];
            const myBalance = globalGameState.players_data[myUsername].balance;
            
            document.getElementById('manage-title').innerText = companyNames[pos];
            let info = `Покращень: ${upgrades}<br>`;
            if (isMortgaged) info += `<span style="color:#e74c3c; font-weight:bold;">ЗАКЛАДЕНО</span>`;
            document.getElementById('manage-info').innerHTML = info;

            const btnContainer = document.getElementById('manage-buttons');
            btnContainer.innerHTML = '';

            const myGroup = colorGroupsList.find(g => g.includes(pos));
            const ownsAll = myGroup.every(p => globalGameState.properties[p] === myUsername);
            if (ownsAll && !isMortgaged && upgrades < 3 && !globalGameState.has_upgraded_this_turn) {
                btnContainer.innerHTML += `<button class="manage-prop-btn btn-unmortgage" ${myBalance < 500 ? 'disabled':''} onclick="manageProp(${pos}, 'upgrade')">Покращити (500)</button>`;
            }
            if (upgrades > 0) {
                btnContainer.innerHTML += `<button class="manage-prop-btn btn-sell-up" onclick="manageProp(${pos}, 'sell_upgrade')">Продати 1 покращення (+500)</button>`;
            }
            if (upgrades === 0 && !isMortgaged) {
                btnContainer.innerHTML += `<button class="manage-prop-btn btn-mortgage" onclick="manageProp(${pos}, 'mortgage')">Закласти майно (+500)</button>`;
            }
            if (isMortgaged) {
                btnContainer.innerHTML += `<button class="manage-prop-btn btn-unmortgage" ${myBalance < 1000 ? 'disabled':''} onclick="manageProp(${pos}, 'unmortgage')">Викупити із застави (1000)</button>`;
            }
            document.getElementById('manage-modal').style.display = 'flex';
        }

        function manageProp(pos, action) { socket.emit('manage_property_action', { room_name: currentRoom, pos: pos, action: action }); closeManageModal(); }
        function closeManageModal() { document.getElementById('manage-modal').style.display = 'none'; }

        // GAME OVER
        socket.on('game_over', function(data) {
            clearInterval(turnTimer);
            const goModal = document.getElementById('game-over-modal');
            const goTitle = document.getElementById('game-over-title');
            if (data.winner === myUsername) { goTitle.innerText = "🏆 ВИ ПЕРЕМОГЛИ! 🏆"; goTitle.style.color = "#2ecc71"; } 
            else { goTitle.innerText = `Гру завершено! Переможець: ${data.winner}`; goTitle.style.color = "#e74c3c"; goModal.querySelector('.modal').style.borderColor = '#e74c3c'; }
            
            // Ховаємо модалку банкрутства, якщо вона була відкрита, і показуємо загальну
            document.getElementById('trade-modal').style.display = 'none';
            document.getElementById('manage-modal').style.display = 'none';
            goModal.style.display = 'flex';
            
            let sec = 5;
            setInterval(() => { sec--; document.getElementById('redirect-timer').innerText = sec; }, 1000);
            setTimeout(() => { window.location.href = '/'; }, 5000);
        });

        // ТОРГІВЛЯ ТА ЧАТ
        function openTradeModal(targetName) { /* ... */ 
            if (!globalGameState) return;
            currentTradeTarget = targetName;
            document.getElementById('trade-modal-title').innerText = `Торгівля з гравцем ${targetName}`;
            const myBalance = globalGameState.players_data[myUsername].balance;
            const targetBalance = globalGameState.players_data[targetName].balance;
            document.getElementById('my-max-money').innerText = myBalance;
            document.getElementById('target-max-money').innerText = targetBalance;
            document.getElementById('trade-offer-money').max = myBalance;
            document.getElementById('trade-request-money').max = targetBalance;
            document.getElementById('trade-offer-money').value = 0;
            document.getElementById('trade-request-money').value = 0;
            const myPropsDiv = document.getElementById('my-props-list');
            const targetPropsDiv = document.getElementById('target-props-list');
            myPropsDiv.innerHTML = ''; targetPropsDiv.innerHTML = '';
            let hasMyProps = false, hasTargetProps = false;
            for (let i = 0; i < 40; i++) {
                if (globalGameState.properties[i] === myUsername) { hasMyProps = true; myPropsDiv.innerHTML += `<label><input type="checkbox" value="${i}" class="offer-prop-check"> ${companyNames[i]}</label>`; }
                if (globalGameState.properties[i] === targetName) { hasTargetProps = true; targetPropsDiv.innerHTML += `<label><input type="checkbox" value="${i}" class="request-prop-check"> ${companyNames[i]}</label>`; }
            }
            if (!hasMyProps) myPropsDiv.innerHTML = '<i>Немає компаній</i>';
            if (!hasTargetProps) targetPropsDiv.innerHTML = '<i>Немає компаній</i>';
            document.getElementById('trade-modal').style.display = 'flex';
        }

        function closeTradeModal() { document.getElementById('trade-modal').style.display = 'none'; }
        
        function sendTradeOffer() {
            socket.emit('propose_trade', {
                room_name: currentRoom, target: currentTradeTarget,
                offer_money: document.getElementById('trade-offer-money').value,
                request_money: document.getElementById('trade-request-money').value,
                offer_props: Array.from(document.querySelectorAll('.offer-prop-check:checked')).map(cb => cb.value),
                request_props: Array.from(document.querySelectorAll('.request-prop-check:checked')).map(cb => cb.value)
            });
            closeTradeModal(); alert('Пропозицію відправлено!');
        }

        socket.on('trade_offer', function(data) {
            if (data.target === myUsername) {
                currentTradeSender = data.sender;
                let offerText = `Бали: <b>${data.offer_money}</b><br>Компанії: ` + (data.offer_props.length > 0 ? data.offer_props.map(i => companyNames[i]).join(', ') : "Немає");
                let reqText = `Бали: <b>${data.request_money}</b><br>Компанії: ` + (data.request_props.length > 0 ? data.request_props.map(i => companyNames[i]).join(', ') : "Немає");
                document.getElementById('incoming-trade-title').innerText = `Пропозиція від ${data.sender}`;
                document.getElementById('incoming-offer-text').innerHTML = offerText;
                document.getElementById('incoming-request-text').innerHTML = reqText;
                document.getElementById('incoming-trade-modal').dataset.offer = JSON.stringify(data);
                document.getElementById('incoming-trade-modal').style.display = 'flex';
            }
        });

        function respondToTrade(accepted) {
            document.getElementById('incoming-trade-modal').style.display = 'none';
            const tradeData = JSON.parse(document.getElementById('incoming-trade-modal').dataset.offer);
            socket.emit('trade_response', {
                room_name: currentRoom, target: myUsername, sender: currentTradeSender, accepted: accepted,
                offer_money: tradeData.offer_money, request_money: tradeData.request_money,
                offer_props: tradeData.offer_props, request_props: tradeData.request_props
            });
        }

        function sendMessage() { const i = document.getElementById('chat-input'); if(i.value.trim()!=="") { socket.emit('send_chat_message', {room_name: currentRoom, message: i.value}); i.value=''; } }
        function handleKeyPress(e) { if(e.key==='Enter') sendMessage(); }
        socket.on('receive_chat_message', function(data) {
            const m = document.getElementById('chat-messages');
            const d = document.createElement('div'); d.className = 'chat-message';
            d.innerHTML = `<div class="message-sender">${data.sender}</div><div class="message-text">${data.message}</div>`;
            if(data.sender === 'СИСТЕМА') d.style.backgroundColor = '#fff3cd';
            m.appendChild(d); m.scrollTop = m.scrollHeight;
        });
    </script>
</body>
</html>
